services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      POSTGRES_SOURCE_URL: jdbc:postgresql://postgres:5432/users_db
      POSTGRES_SOURCE_USER: postgres
      POSTGRES_SOURCE_PASSWORD: postgres
      MYSQL_SOURCE_URL: jdbc:mysql://mysql:3306/users_db
      MYSQL_SOURCE_USER: mysql
      MYSQL_SOURCE_PASSWORD: mysql
    depends_on:
      postgres:
        condition: service_healthy
      mysql:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: users_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d users_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  mysql:
    image: mysql:8.4.0
    environment:
      MYSQL_DATABASE: users_db
      MYSQL_USER: mysql
      MYSQL_PASSWORD: mysql
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-hmysql", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 15
